name = "spotifactory-auth"
main = "worker.js"
compatibility_date = "2024-09-23"

# Workers KV namespace for session storage.
# One-time setup:
#   1. wrangler login
#   2. wrangler kv namespace create SESSIONS
#   3. Paste the returned id below and in deploy/relay/wrangler.toml
#   4. wrangler deploy
[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
